# Z-R0crypt Hugo Configuration (Fixed v0.161.1+)
baseURL = "https://z-r0crypt.github.io/"
locale = "en-us"  # FIXED: replaces deprecated languageCode
title = "z-r0crypt"
theme = "PaperMod"
paginate = 10
languageCode = "en"  # Keep for backward compatibility but won't error

enableRobotsTXT = true     # Tells Hugo to build a native robots.txt file for search crawlers
enableEmoji = true         # Enables standard markdown emojis (e.g., :lock: -> 🔒)
minify.disableXML = true   # Optimizes asset size processing for faster load times

# Google Analytics - GA4
googleAnalytics = "G-E0K2CP5DEL"
google_verify = "lKxcocybGM-2fyrJhswx85Oxp6S4sqLCd-M0H34O-Ko"


[outputFormats.llms]
  mediaType = "text/plain"
  baseName = "llms"
  isPlainText = true
  notAlternative = true

# Enable RSS and other output formats
[outputs]
  home = ["HTML", "JSON", "RSS", "llms"]

# -------------------------------------------------------------
# MAIN PARAMETERS (Keep flat variables together)
# -------------------------------------------------------------
[params]
  description = "Research lead in offensive security, AI/ML red teaming, and adversarial engineering"
  author = "z-r0crypt"
  defaultTheme = "dark"
  ShowToc = true
  TocOpen = false
  env = "production"  # Fixed placement: safely inside main params
  customCSS = ["css/custom.css"]
  ShowShareButtons = true     # Adds clean, lightweight icons at the bottom to share posts
  ShowReadingTime = true      # Displays an estimated read time at the top of long guides
  ShowPostNavLinks = true     # Adds "Previous Post" / "Next Post" links to step through guides
  ShowBreadCrumbs = true      # Improves navigation clarity (e.g., Home » Posts » OffSec)
  ShowPageNums = true         # Enables pagination numbers at the bottom of your feed

  # Cover settings
  [params.cover]
    image = ""
    relative = false

  # Edit Post links
  [params.editPost]
    URL = "https://github.com/z-r0crypt/z-r0crypt.github.io/tree/main/content"
    Text = "Suggest Changes"

  # Sidebar toggle
  [params.sidebar]
    enabled = false

  # Assets & Highlight JS configuration
  [params.assets]
    disableHLJS = false
    favicon = ""

  # Local Search engine configuration
  [params.search]
    enabled = true
    type = "fuse"
    showOnHeader = true

  # Homepage Identity Card
  [params.homeInfoParams]
    Title = "Red Teaming in the Age of AI"
    Content = "Building secure systems through principled attacks."

  # Google AdSense (Auto-Ads Disabled)
  [params.googleAdsense]
    enabled = false
    publisherId = "ca-pub-3835157681642549"
    autoAds = false

  # Social links arrays
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/z-r0crypt"
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/vbtr"
  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/zer0crypt"
  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml" # Fixed: relative path for local testing safety

# -------------------------------------------------------------
# NAVIGATION MENU
# -------------------------------------------------------------
[menu]
[[menu.main]]
  identifier = "research"
  name = "Posts"
  url = "/posts"
  weight = 10

[[menu.main]]
  identifier = "exploits"
  name = "Exploits & Tools"
  url = "/categories/tools"
  weight = 20

[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 40

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 50

# Taxonomies
[taxonomies]
  category = "categories"
  tag = "tags"

# Markup settings
[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    hl_Lines = ""
    lineAnchors = ""
    lineNoStart = 1
    lineNos = false
    noClasses = false
    style = "monokai"
    tabWidth = 4
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2
  [markup.goldmark.renderer]
    unsafe = true  # Permits rendering of raw HTML elements directly within Markdown files

# Security headers
[security]
  [security.exec]
    allow = ["^dart-sass-embedded$", "^go$", "^npx$", "^postcss$"]
  [security.funcs]
    getenv = ["^HUGO_"]
  [security.oscmd]
    allow = ["^dart-sass-embedded$", "^npx$"]

# Media types for RSS
[mediaTypes."application/rss+xml"]
  suffixes = ["xml"]